services:
  - type: web
    name: original-street
    runtime: static
    buildCommand: "true"
    staticPublishPath: .
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
