services:
  - type: web
    name: original-street
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
